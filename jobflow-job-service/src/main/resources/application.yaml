spring:
  application:
    name: jobflow-job-service

  config:
    import: "optional:file:.env[.properties],optional:file:../.env[.properties]"

  datasource:
    url: jdbc:postgresql://localhost:5432/jobflow
    username: jobflow
    password: ${DB_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        enable.idempotence: true

  elasticsearch:
    uris: http://localhost:9200

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

server:
  port: 8080

logging:
  level:
    root: INFO                       # set com.jobflow.jobservice: DEBUG for verbose app logs
  file:
    name: logs/jobflow.log           # write logs to this file (in addition to console)
  logback:
    rollingpolicy:
      max-file-size: 10MB            # roll over when a file reaches 10MB
      max-history: 7                 # keep 7 archived files, delete older

management:
  endpoints:
    web:
      exposure:
        include: health,info          # expose ONLY these; everything else stays off
  endpoint:
    health:
      show-details: when_authorized    # component details (db, redis, disk) only for authenticated users

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000